<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客户预定入口</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      color: white;
      padding: 28px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.25);
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.07);
    }

    .card h2 {
      margin-top: 0;
      font-size: 22px;
      color: #1d4ed8;
    }

    label {
      display: block;
      margin-top: 16px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      box-sizing: border-box;
      background: white;
    }

    option:disabled {
      color: #999;
      background: #eeeeee;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .summary {
      background: #f8fafc;
      border-radius: 16px;
      padding: 18px;
      line-height: 1.8;
      border: 1px solid #e5e7eb;
    }

    .price {
      font-size: 28px;
      font-weight: bold;
      color: #dc2626;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: #2563eb;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
    }

    button:hover {
      background: #1d4ed8;
    }

    .notice {
      font-size: 14px;
      color: #666;
      margin-top: 12px;
      line-height: 1.6;
    }

    .status-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .status-item {
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      border: 1px solid #e5e7eb;
    }

    .available {
      background: #dcfce7;
      color: #166534;
    }

    .busy {
      background: #fee2e2;
      color: #991b1b;
    }

    .cleaning {
      background: #fef3c7;
      color: #92400e;
    }

    .disabled {
      background: #e5e7eb;
      color: #4b5563;
    }
  </style>
</head>

<body>

<div class="page">

  <div class="header">
    <h1>共享房间在线预定</h1>
    <p>系统会自动过滤不可用房间、工作中疗愈师和不可预定时间。</p>
  </div>

  <div class="card">
    <h2>1. 选择服务</h2>

    <label>服务分类</label>
    <select id="category" onchange="loadServiceItems()">
      <option value="">请选择服务分类</option>
    </select>

    <label>服务项目</label>
    <select id="serviceItem" onchange="loadTechnicians(); loadRooms(); updateSummary();">
      <option value="">请先选择服务分类</option>
    </select>
  </div>

  <div class="card">
    <h2>2. 选择日期和时间</h2>

    <div class="grid">
      <div>
        <label>预定日期</label>
        <input type="date" id="bookingDate" onchange="loadTechnicians(); loadRooms(); updateSummary();">
      </div>

      <div>
        <label>开始时间</label>
        <select id="startTime" onchange="loadTechnicians(); loadRooms(); updateSummary();">
          <option value="">请选择时间</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>3. 选择疗愈师和房间</h2>

    <label>选择疗愈师</label>
    <select id="technician" onchange="updateSummary()">
      <option value="">请先选择服务项目和时间</option>
    </select>

    <label>选择房间</label>
    <select id="room" onchange="updateSummary()">
      <option value="">请先选择服务项目和时间</option>
    </select>

    <div class="status-box" id="statusBox"></div>
  </div>

  <div class="card">
    <h2>4. 客户信息</h2>

    <label>客户姓名</label>
    <input type="text" id="customerName" placeholder="请输入姓名">

    <label>手机号码</label>
    <input type="tel" id="customerPhone" placeholder="请输入手机号码">
  </div>

  <div class="card">
    <h2>订单确认</h2>

    <div class="summary" id="summaryBox">
      请选择服务项目、疗愈师、房间和时间。
    </div>

    <button onclick="submitOrder()">确认预定并生成订单</button>

    <div class="notice">
      灰色和红色选项不可选择。例如：工作中、清洁中、维修中、已被预定。
    </div>
  </div>

</div>

<script>
  const serviceCategories = [
    { id: 1, name: "催乳小能手服务" },
    { id: 2, name: "胀奶痛苦解除服务" },
    { id: 3, name: "康复按摩心理舒缓服务" }
  ];

  const serviceItems = [
    { id: 1, category_id: 1, name: "60分钟催乳小能手服务", duration: 60, price: 299 },
    { id: 2, category_id: 1, name: "90分钟催乳小能手服务", duration: 90, price: 399 },
    { id: 3, category_id: 2, name: "60分钟胀奶痛苦解除服务", duration: 60, price: 499 },
    { id: 4, category_id: 2, name: "90分钟胀奶痛苦解除服务", duration: 90, price: 699 },
    { id: 5, category_id: 3, name: "120分钟康复按摩心理舒缓服务", duration: 120, price: 899 }
  ];

  const technicians = [
    { id: 1, name: "疗愈师 A", status: "available" },
    { id: 2, name: "疗愈师 B", status: "busy" },
    { id: 3, name: "疗愈师 C", status: "available" },
    { id: 4, name: "疗愈师 D", status: "off" }
  ];

  const rooms = [
    { id: 1, name: "房间 01", status: "available" },
    { id: 2, name: "房间 02", status: "busy" },
    { id: 3, name: "房间 03", status: "cleaning" },
    { id: 4, name: "房间 04", status: "available" },
    { id: 5, name: "房间 05", status: "repair" },
    { id: 6, name: "房间 06", status: "available" },
    { id: 7, name: "房间 07", status: "available" },
    { id: 8, name: "房间 08", status: "busy" },
    { id: 9, name: "房间 09", status: "available" },
    { id: 10, name: "房间 10", status: "available" }
  ];

  const technicianServices = [
    { technician_id: 1, service_item_id: 1 },
    { technician_id: 1, service_item_id: 2 },
    { technician_id: 2, service_item_id: 3 },
    { technician_id: 2, service_item_id: 4 },
    { technician_id: 3, service_item_id: 1 },
    { technician_id: 3, service_item_id: 5 },
    { technician_id: 4, service_item_id: 2 }
  ];

  const existingOrders = [
    {
      technician_id: 1,
      room_id: 1,
      booking_date: "2026-05-25",
      start_time: "14:00",
      status: "working"
    },
    {
      technician_id: 3,
      room_id: 4,
      booking_date: "2026-05-25",
      start_time: "16:00",
      status: "working"
    }
  ];

  function initPage() {
    const categorySelect = document.getElementById("category");
    serviceCategories.forEach(item => {
      categorySelect.innerHTML += `<option value="${item.id}">${item.name}</option>`;
    });

    const startTimeSelect = document.getElementById("startTime");
    for (let h = 0; h < 24; h++) {
      const time = String(h).padStart(2, "0") + ":00";
      startTimeSelect.innerHTML += `<option value="${time}">${time}</option>`;
    }

    loadRooms();
  }

  function loadServiceItems() {
    const categoryId = Number(document.getElementById("category").value);
    const serviceSelect = document.getElementById("serviceItem");

    serviceSelect.innerHTML = `<option value="">请选择服务项目</option>`;

    serviceItems
      .filter(item => item.category_id === categoryId)
      .forEach(item => {
        serviceSelect.innerHTML += `
          <option value="${item.id}">
            ${item.name}｜${item.duration}分钟｜¥${item.price}
          </option>
        `;
      });

    loadTechnicians();
    loadRooms();
    updateSummary();
  }

  function isTechnicianWorking(technicianId) {
    const date = document.getElementById("bookingDate").value;
    const time = document.getElementById("startTime").value;

    return existingOrders.some(order =>
      order.technician_id === technicianId &&
      order.booking_date === date &&
      order.start_time === time &&
      order.status === "working"
    );
  }

  function isRoomWorking(roomId) {
    const date = document.getElementById("bookingDate").value;
    const time = document.getElementById("startTime").value;

    return existingOrders.some(order =>
      order.room_id === roomId &&
      order.booking_date === date &&
      order.start_time === time &&
      order.status === "working"
    );
  }

  function loadTechnicians() {
    const serviceItemId = Number(document.getElementById("serviceItem").value);
    const technicianSelect = document.getElementById("technician");

    technicianSelect.innerHTML = `<option value="">请选择疗愈师</option>`;

    if (!serviceItemId) {
      technicianSelect.innerHTML = `<option value="">请先选择服务项目</option>`;
      return;
    }

    const allowedTechnicianIds = technicianServices
      .filter(item => item.service_item_id === serviceItemId)
      .map(item => item.technician_id);

    technicians
      .filter(t => allowedTechnicianIds.includes(t.id))
      .forEach(t => {
        let disabled = false;
        let note = "";

        if (t.status === "busy") {
          disabled = true;
          note = "｜工作中";
        } else if (t.status === "off") {
          disabled = true;
          note = "｜休息中";
        } else if (isTechnicianWorking(t.id)) {
          disabled = true;
          note = "｜该时间已被预定";
        } else {
          note = "｜可预约";
        }

        technicianSelect.innerHTML += `
          <option value="${t.id}" ${disabled ? "disabled" : ""}>
            ${t.name}${note}
          </option>
        `;
      });

    updateStatusBox();
  }

  function loadRooms() {
    const roomSelect = document.getElementById("room");
    roomSelect.innerHTML = `<option value="">请选择房间</option>`;

    rooms.forEach(room => {
      let disabled = false;
      let note = "";

      if (room.status === "busy") {
        disabled = true;
        note = "｜使用中";
      } else if (room.status === "cleaning") {
        disabled = true;
        note = "｜清洁中";
      } else if (room.status === "repair") {
        disabled = true;
        note = "｜维修中";
      } else if (isRoomWorking(room.id)) {
        disabled = true;
        note = "｜该时间已被预定";
      } else {
        note = "｜可预定";
      }

      roomSelect.innerHTML += `
        <option value="${room.id}" ${disabled ? "disabled" : ""}>
          ${room.name}${note}
        </option>
      `;
    });

    updateStatusBox();
  }

  function updateStatusBox() {
    const statusBox = document.getElementById("statusBox");
    let html = "";

    technicians.forEach(t => {
      let className = "available";
      let text = "可预约";

      if (t.status === "busy") {
        className = "busy";
        text = "工作中";
      } else if (t.status === "off") {
        className = "disabled";
        text = "休息中";
      } else if (isTechnicianWorking(t.id)) {
        className = "busy";
        text = "当前时间已被预定";
      }

      html += `<div class="status-item ${className}">${t.name}：${text}</div>`;
    });

    rooms.forEach(room => {
      let className = "available";
      let text = "可预定";

      if (room.status === "busy") {
        className = "busy";
        text = "使用中";
      } else if (room.status === "cleaning") {
        className = "cleaning";
        text = "清洁中";
      } else if (room.status === "repair") {
        className = "disabled";
        text = "维修中";
      } else if (isRoomWorking(room.id)) {
        className = "busy";
        text = "当前时间已被预定";
      }

      html += `<div class="status-item ${className}">${room.name}：${text}</div>`;
    });

    statusBox.innerHTML = html;
  }

  function getSelectedText(id) {
    const el = document.getElementById(id);
    return el.options[el.selectedIndex]?.text || "";
  }

  function getSelectedServiceItem() {
    const serviceItemId = Number(document.getElementById("serviceItem").value);
    return serviceItems.find(item => item.id === serviceItemId);
  }

  function updateSummary() {
    const service = getSelectedServiceItem();
    const technician = getSelectedText("technician");
    const room = getSelectedText("room");
    const bookingDate = document.getElementById("bookingDate").value;
    const startTime = document.getElementById("startTime").value;

    if (!service) {
      document.getElementById("summaryBox").innerHTML = "请选择服务项目、疗愈师、房间和时间。";
      return;
    }

    document.getElementById("summaryBox").innerHTML = `
      <p><strong>服务项目：</strong>${service.name}</p>
      <p><strong>服务时长：</strong>${service.duration} 分钟</p>
      <p><strong>选择疗愈师：</strong>${technician || "未选择"}</p>
      <p><strong>选择房间：</strong>${room || "未选择"}</p>
      <p><strong>预定时间：</strong>${bookingDate || "未选择日期"} ${startTime || ""}</p>
      <p><strong>订单金额：</strong><span class="price">¥${service.price}</span></p>
    `;
  }

  function submitOrder() {
    const customerName = document.getElementById("customerName").value.trim();
    const customerPhone = document.getElementById("customerPhone").value.trim();
    const serviceItem = getSelectedServiceItem();
    const technicianId = document.getElementById("technician").value;
    const roomId = document.getElementById("room").value;
    const bookingDate = document.getElementById("bookingDate").value;
    const startTime = document.getElementById("startTime").value;

    if (!customerName || !customerPhone) {
      alert("请填写客户姓名和手机号");
      return;
    }

    if (!serviceItem || !technicianId || !roomId || !bookingDate || !startTime) {
      alert("请选择完整的服务、疗愈师、房间和时间");
      return;
    }

    alert(
      "订单已生成！\n\n" +
      "客户：" + customerName + "\n" +
      "手机号：" + customerPhone + "\n" +
      "项目：" + serviceItem.name + "\n" +
      "金额：¥" + serviceItem.price + "\n\n" +
      "下一步接入数据库和支付。"
    );
  }

  initPage();
</script>

</body>
</html>
