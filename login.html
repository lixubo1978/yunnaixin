
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>登录 / 注册</title>

  <style>

    * {
      box-sizing: border-box;
    }

    body {

      margin: 0;

      font-family:
        Arial,
        "Microsoft YaHei",
        sans-serif;

      background:
        linear-gradient(
          135deg,
          #ec4899,
          #f472b6
        );

      min-height: 100vh;

      display: flex;

      justify-content: center;

      align-items: center;
    }

    .login-container {

      width: 100%;

      max-width: 430px;

      background: white;

      border-radius: 24px;

      padding: 40px;

      box-shadow:
        0 15px 40px rgba(0,0,0,0.2);
    }

    .login-title {

      text-align: center;

      margin-bottom: 24px;
    }

    .login-title h1 {

      margin: 0;

      font-size: 30px;

      color: #ec4899;
    }

    .login-title p {

      margin-top: 10px;

      color: #666;

      font-size: 14px;
    }

    .tabs {

      display: grid;

      grid-template-columns: 1fr 1fr;

      background: #fce7f3;

      border-radius: 14px;

      padding: 4px;

      margin-bottom: 24px;
    }

    .tab {

      border: none;

      padding: 12px;

      border-radius: 12px;

      cursor: pointer;

      font-weight: bold;

      background: transparent;

      color: #555;

      transition: 0.2s;
    }

    .tab.active {

      background: #db2777;

      color: white;
    }

    .form-group {

      margin-bottom: 18px;
    }

    .form-group label {

      display: block;

      margin-bottom: 8px;

      color: #333;

      font-weight: bold;
    }

    .form-group input,
    .form-group select {

      width: 100%;

      padding: 14px;

      border-radius: 14px;

      border:
        1px solid #f9a8d4;

      font-size: 15px;

      transition: 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {

      outline: none;

      border-color: #ec4899;

      box-shadow:
        0 0 0 4px
        rgba(236,72,153,0.15);
    }

    .submit-btn {

      width: 100%;

      padding: 15px;

      border: none;

      border-radius: 14px;

      background: #db2777;

      color: white;

      font-size: 16px;

      font-weight: bold;

      cursor: pointer;

      margin-top: 6px;

      transition: 0.2s;
    }

    .submit-btn:hover {

      background: #be185d;
    }

    .hidden {
      display: none;
    }

    .footer-text {

      margin-top: 24px;

      text-align: center;

      font-size: 12px;

      color: #999;
    }

  </style>
</head>

<body>

  <div class="login-container">

    <div class="login-title">

      <h1 id="pageTitle">
        登录
      </h1>

      <p>
        共享空间 / 理疗服务平台
      </p>

    </div>

    <div class="tabs">

      <button
        class="tab active"
        id="loginTab"
        onclick="switchMode('login')"
      >
        登录
      </button>

      <button
        class="tab"
        id="registerTab"
        onclick="switchMode('register')"
      >
        注册
      </button>

    </div>

    <div
      class="form-group hidden"
      id="nameGroup"
    >

      <label>姓名</label>

      <input
        type="text"
        id="realName"
        placeholder="请输入姓名"
      />

    </div>

    <div class="form-group">

      <label>账号 / 手机号</label>

      <input
        type="text"
        id="username"
        placeholder="请输入账号或手机号"
      />

    </div>

    <div class="form-group">

      <label>密码</label>

      <input
        type="password"
        id="password"
        placeholder="请输入密码"
      />

    </div>

    <div
      class="form-group hidden"
      id="confirmPasswordGroup"
    >

      <label>确认密码</label>

      <input
        type="password"
        id="confirmPassword"
        placeholder="请再次输入密码"
      />

    </div>

    <div class="form-group">

      <label>身份</label>

      <select id="role">

        <option value="customer">
          普通客户
        </option>

        <option value="therapist">
          理疗师
        </option>

        <option value="admin">
          后台管理人员
        </option>

      </select>

    </div>

    <button
      class="submit-btn"
      id="submitBtn"
      onclick="submitForm()"
    >
      登录
    </button>

    <div class="footer-text">
      Welcome
    </div>

  </div>

  <script>

    const API_BASE_URL =
      "http://localhost:3000";

    let currentMode = "login";

    function switchMode(mode) {

      currentMode = mode;

      const pageTitle =
        document.getElementById("pageTitle");

      const loginTab =
        document.getElementById("loginTab");

      const registerTab =
        document.getElementById("registerTab");

      const nameGroup =
        document.getElementById("nameGroup");

      const confirmPasswordGroup =
        document.getElementById(
          "confirmPasswordGroup"
        );

      const submitBtn =
        document.getElementById("submitBtn");

      if (mode === "login") {

        pageTitle.innerText = "登录";

        submitBtn.innerText = "登录";

        loginTab.classList.add("active");

        registerTab.classList.remove("active");

        nameGroup.classList.add("hidden");

        confirmPasswordGroup.classList.add("hidden");
      }

      if (mode === "register") {

        pageTitle.innerText = "注册";

        submitBtn.innerText = "注册";

        registerTab.classList.add("active");

        loginTab.classList.remove("active");

        nameGroup.classList.remove("hidden");

        confirmPasswordGroup.classList.remove("hidden");
      }
    }

    function submitForm() {

      if (currentMode === "login") {

        login();

      } else {

        register();
      }
    }

    async function login() {

      const username =
        document.getElementById("username")
        .value
        .trim();

      const password =
        document.getElementById("password")
        .value
        .trim();

      const role =
        document.getElementById("role")
        .value;

      if (
        username === "" ||
        password === ""
      ) {

        alert("请输入账号和密码");

        return;
      }

      try {

        const response =
          await fetch(
            API_BASE_URL + "/api/login",
            {
              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body: JSON.stringify({
                username,
                password,
                role
              })
            }
          );

        const result =
          await response.json();

        if (!result.success) {

          alert(result.message);

          return;
        }

        alert("登录成功");

        localStorage.setItem(
          "user",
          JSON.stringify(result.user)
        );

        goToPage(role);

      } catch (error) {

        alert("服务器连接失败");
      }
    }

    async function register() {

      const realName =
        document.getElementById("realName")
        .value
        .trim();

      const username =
        document.getElementById("username")
        .value
        .trim();

      const password =
        document.getElementById("password")
        .value
        .trim();

      const confirmPassword =
        document.getElementById(
          "confirmPassword"
        )
        .value
        .trim();

      const role =
        document.getElementById("role")
        .value;

      if (
        realName === "" ||
        username === "" ||
        password === "" ||
        confirmPassword === ""
      ) {

        alert("请完整填写注册信息");

        return;
      }

      if (
        password !== confirmPassword
      ) {

        alert("两次输入的密码不一致");

        return;
      }

      try {

        const response =
          await fetch(
            API_BASE_URL + "/api/register",
            {
              method: "POST",

              headers: {
                "Content-Type":
                  "application/json"
              },

              body: JSON.stringify({
                name: realName,
                username,
                password,
                role
              })
            }
          );

        const result =
          await response.json();

        alert(result.message);

        if (result.success) {

          switchMode("login");

          document.getElementById(
            "password"
          ).value = "";

          document.getElementById(
            "confirmPassword"
          ).value = "";
        }

      } catch (error) {

        alert("服务器连接失败");
      }
    }

    function goToPage(role) {

      if (role === "customer") {

        window.location.href =
          "customer.html";
      }

      if (role === "therapist") {

        window.location.href =
          "therapist.html";
      }

      if (role === "admin") {

        window.location.href =
          "admin.html";
      }
    }

  </script>

</body>
</html>
```
